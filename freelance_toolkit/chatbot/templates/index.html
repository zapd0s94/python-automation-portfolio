<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Business Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0D2137; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .chat-container { width: 800px; height: 90vh; background: #fff; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .chat-header { background: #0D2137; padding: 20px; text-align: center; }
        .chat-header h1 { color: #F9A825; font-size: 1.4rem; }
        .chat-header p { color: #90CAF9; font-size: 0.85rem; margin-top: 4px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #F8FAFC; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; }
        .message.user { background: #1565C0; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.bot { background: white; color: #1A1A2E; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .message.typing { background: white; color: #999; align-self: flex-start; font-style: italic; }
        .chat-input { padding: 16px; background: white; border-top: 1px solid #E0E0E0; display: flex; gap: 10px; }
        .chat-input input { flex: 1; padding: 12px 16px; border: 2px solid #E0E0E0; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border 0.2s; }
        .chat-input input:focus { border-color: #1565C0; }
        .chat-input button { padding: 12px 24px; background: #0D2137; color: #F9A825; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .chat-input button:hover { background: #1565C0; color: white; }
        .welcome { text-align: center; color: #999; font-size: 0.9rem; padding: 20px; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h1>🤖 AI Business Assistant</h1>
        <p>Powered by Groq AI — Ask me anything</p>
    </div>
    <div class="chat-messages" id="messages">
        <div class="welcome">👋 Hello! I'm your AI assistant. How can I help you today?</div>
    </div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your message..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">Send ➤</button>
    </div>
</div>
<script>
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const messages = document.getElementById('messages');
        const text = input.value.trim();
        if (!text) return;

        messages.innerHTML += `<div class="message user">${text}</div>`;
        input.value = '';
        messages.innerHTML += `<div class="message typing" id="typing">⏳ Thinking...</div>`;
        messages.scrollTop = messages.scrollHeight;

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            });
            const data = await res.json();
            document.getElementById('typing').remove();
            messages.innerHTML += `<div class="message bot">${data.reply}</div>`;
        } catch(e) {
            document.getElementById('typing').remove();
            messages.innerHTML += `<div class="message bot">❌ Error connecting to server.</div>`;
        }
        messages.scrollTop = messages.scrollHeight;
    }

    function handleKey(e) {
        if (e.key === 'Enter') sendMessage();
    }
</script>
</body>
</html>
